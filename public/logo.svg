<svg viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Le Panaf">
  <!-- Marque géométrique : deux formes en losange entrelacées évoquant un pont / connexion -->
  <g>
    <!-- Losange principal (terracotta) -->
    <path d="M20 8 L32 24 L20 40 L8 24 Z" fill="#C8553D"/>
    <!-- Losange secondaire (vert) décalé, légèrement superposé -->
    <path d="M32 8 L44 24 L32 40 L20 24 Z" fill="#2D4A3E"/>
    <!-- Point de jonction central (superposition) -->
    <path d="M20 24 L32 8 L44 24 L32 40 Z" fill="#0F0F0E" opacity="0.12"/>
  </g>
  <!-- Wordmark -->
  <text x="54" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" letter-spacing="0.12em" fill="#6B6B68" text-transform="uppercase">LE</text>
  <text x="54" y="38" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="0.04em" fill="#0F0F0E">PANAF</text>
</svg>
